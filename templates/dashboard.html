{% block scripts %}
<script>
const CIRC = 339.3;
let isPolling = false;
let lastTimestamp = '';
let snapCount = 0;
let snapFpsT = Date.now();

// ── Show local webcam directly in browser (no server delay) ──
async function startLocalCam(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 30 } },
      audio: false
    });
    const img = document.getElementById('cam-img');
    const ph  = document.getElementById('cam-placeholder');

    // Replace img with video element
    const video = document.createElement('video');
    video.id = 'cam-video';
    video.autoplay = true;
    video.playsInline = true;
    video.muted = true;
    video.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
    img.parentNode.insertBefore(video, img);
    img.style.display = 'none';

    video.srcObject = stream;
    ph.style.display = 'none';
    document.getElementById('fps-badge').textContent = 'LOCAL CAM';
    document.getElementById('cam-ts').textContent = 'Direct feed — no delay';

    // Also push frames to Render for YOLO in background
    pushFramesToRender(video);

  } catch(err){
    console.warn('Local cam failed, falling back to server feed:', err);
    // Fall back to server snapshot polling
    startServerFeed();
  }
}

// ── Push frames to Render for YOLO detection (background task) ──
function pushFramesToRender(video){
  const canvas = document.createElement('canvas');
  canvas.width  = 640;
  canvas.height = 360;
  const ctx = canvas.getContext('2d');

  setInterval(() => {
    if(video.readyState < 2) return;
    ctx.drawImage(video, 0, 0, 640, 360);
    const b64 = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];
    fetch('/api/push-frame', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Cam-Token': 'occupai_cam_2027'
      },
      body: JSON.stringify({ frame: b64 })
    }).catch(()=>{});
  }, 500); // push every 500ms for YOLO — enough for detection
}

// ── Fallback: server snapshot polling ──
function startServerFeed(){
  setInterval(pollSnap, 300);
}

async function pollSnap(){
  if(isPolling) return;
  isPolling = true;
  try{
    const r = await fetch('/api/snapshot');
    const d = await r.json();
    if(d.image && d.timestamp !== lastTimestamp){
      lastTimestamp = d.timestamp;
      const newImg = new Image();
      newImg.onload = () => {
        const img = document.getElementById('cam-img');
        const ph  = document.getElementById('cam-placeholder');
        img.src = newImg.src;
        img.style.display = 'block';
        ph.style.display  = 'none';
        document.getElementById('cam-ts').textContent = d.timestamp;

        snapCount++;
        const now = Date.now();
        if(now - snapFpsT >= 2000){
          const fps = (snapCount / ((now - snapFpsT) / 1000)).toFixed(1);
          document.getElementById('fps-badge').textContent = `${fps} fps`;
          snapCount = 0; snapFpsT = now;
        }
      };
      newImg.src = 'data:image/jpeg;base64,' + d.image;
    }
  } catch(e){
  } finally{
    isPolling = false;
  }
}

function setRing(pct){
  const el = document.getElementById('ring-fill');
  el.style.strokeDashoffset = CIRC - (pct/100)*CIRC;
  el.style.stroke = pct>=90?'var(--danger)':pct>=65?'var(--warn)':'var(--accent)';
  document.getElementById('ring-pct').textContent = Math.round(pct);
}

function renderHourBars(hourly, peakHour){
  const c = document.getElementById('hour-bars');
  const vals = Object.values(hourly);
  const max = Math.max(...vals,1);
  c.innerHTML = Object.entries(hourly).map(([h,v])=>`
    <div class="hour-bar-wrap">
      <div class="hour-bar${parseInt(h)===peakHour?' peak':''}" style="height:${Math.round((v/max)*70)+8}px"></div>
      <div class="hour-lbl">${h}</div>
    </div>`).join('');
}

function renderPredBadges(busy,quiet,peakLabel){
  const c = document.getElementById('pred-badges');
  c.innerHTML = `<span style="font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid #f59e0b40;color:var(--warn)">Peak: ${peakLabel}</span>`
    + busy.map(d=>`<span style="font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid #ef444430;color:var(--warn)">${d}</span>`).join('')
    + quiet.map(d=>`<span style="font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid #00e5a030;color:var(--accent)">${d}</span>`).join('');
}

async function pollStats(){
  try{
    const r = await fetch('/api/stats');
    const d = await r.json();
    document.getElementById('s-free').textContent    = d.free;
    document.getElementById('s-occ').textContent     = d.occupied;
    document.getElementById('s-total').textContent   = d.total;
    document.getElementById('s-ts').textContent      = d.timestamp;
    document.getElementById('leg-free').textContent  = `${d.free} free`;
    document.getElementById('leg-occ').textContent   = `${d.occupied} occupied`;
    document.getElementById('leg-total').textContent = `${d.total} total`;
    setRing(d.occupancy_pct);
    const banner = document.getElementById('lot-full-banner');
    if(d.lot_full){
      banner.classList.add('show');
      document.getElementById('lot-full-ts').textContent = d.timestamp;
    } else {
      banner.classList.remove('show');
    }
  } catch(e){}
}

async function pollPred(){
  try{
    const r = await fetch('/api/predictions');
    const d = await r.json();
    renderHourBars(d.hourly_est, d.peak_hour);
    renderPredBadges(d.busy_days, d.quiet_days, d.peak_label);
  } catch(e){}
}

setRing({{ occupancy_pct }});

// Start local cam first (smooth), push to Render for YOLO in background
startLocalCam();
pollStats();
pollPred();

setInterval(pollStats, 2000);
setInterval(pollPred,  30000);
</script>
{% endblock %}
