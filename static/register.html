<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OccupAI — Register</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #080B14;
    --surface: #0D1120;
    --border:  #1E2840;
    --cyan:    #00D2FF;
    --green:   #00E67A;
    --red:     #FF3B5C;
    --muted:   #4A5580;
    --text:    #D8E0F5;
    --white:   #EEF2FF;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px 0;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 60px 60px;
    opacity: 0.3;
    pointer-events: none;
  }
  .card {
    position: relative;
    z-index: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 36px;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 0 60px rgba(0,210,255,0.05);
  }
  .logo { text-align: center; margin-bottom: 8px; }
  .logo-occup { font-size: 32px; font-weight: 900; color: var(--cyan); letter-spacing: -1px; text-shadow: 0 0 30px rgba(0,210,255,0.4); }
  .logo-ai    { font-size: 32px; font-weight: 900; color: var(--white); letter-spacing: -1px; }
  .logo-sub   { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 3px; display: block; margin-top: 4px; }
  h2 {
    text-align: center;
    font-size: 16px;
    font-weight: 400;
    color: var(--muted);
    margin-bottom: 28px;
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 2px;
  }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .field { margin-bottom: 16px; }
  label {
    display: block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  input {
    width: 100%;
    background: #0A0D1A;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--white);
    font-family: 'Exo 2', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  input:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 3px rgba(0,210,255,0.1);
  }
  input::placeholder { color: var(--muted); }
  input.error-field { border-color: var(--red) !important; }

  .error-msg {
    display: none;
    background: rgba(255,59,92,0.1);
    border: 1px solid rgba(255,59,92,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--red);
    font-size: 13px;
    margin-bottom: 16px;
    text-align: center;
  }

  .success-msg {
    display: none;
    background: rgba(0,230,122,0.1);
    border: 1px solid rgba(0,230,122,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--green);
    font-size: 13px;
    margin-bottom: 16px;
    text-align: center;
  }

  /* Password strength */
  .strength-bar {
    height: 4px;
    border-radius: 99px;
    background: var(--border);
    margin-top: 8px;
    overflow: hidden;
  }
  .strength-fill {
    height: 100%;
    border-radius: 99px;
    width: 0%;
    transition: width 0.3s, background 0.3s;
  }
  .strength-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    margin-top: 4px;
  }

  .btn {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--cyan), #0099CC);
    color: #000;
    font-family: 'Exo 2', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 4px;
  }
  .btn:hover   { opacity: 0.9; }
  .btn:active  { transform: scale(0.99); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .divider {
    text-align: center;
    margin: 20px 0;
    color: var(--muted);
    font-size: 12px;
    font-family: 'Share Tech Mono', monospace;
    position: relative;
  }
  .divider::before, .divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 42%;
    height: 1px;
    background: var(--border);
  }
  .divider::before { left: 0; }
  .divider::after  { right: 0; }

  .link {
    display: block;
    text-align: center;
    color: var(--cyan);
    font-size: 13px;
    text-decoration: none;
    transition: opacity 0.2s;
  }
  .link:hover { opacity: 0.75; }

  .note {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 20px;
    letter-spacing: 1px;
  }

  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <span class="logo-occup">Occup</span><span class="logo-ai">AI</span>
    <span class="logo-sub">SMART PARKING SYSTEM</span>
  </div>
  <h2>CREATE ACCOUNT</h2>
  <p class="note">DRIVER ACCOUNT — FREE ACCESS</p>

  <div class="error-msg"   id="error-msg"></div>
  <div class="success-msg" id="success-msg"></div>

  <!-- Name row -->
  <div class="row">
    <div class="field">
      <label>FIRST NAME</label>
      <input type="text" id="first_name" placeholder="Juan">
    </div>
    <div class="field">
      <label>LAST NAME</label>
      <input type="text" id="last_name" placeholder="dela Cruz">
    </div>
  </div>

  <div class="field">
    <label>EMAIL ADDRESS</label>
    <input type="email" id="email" placeholder="you@email.com" autocomplete="email">
  </div>

  <div class="field">
    <label>PHONE NUMBER (OPTIONAL)</label>
    <input type="tel" id="phone" placeholder="+63 9XX XXX XXXX">
  </div>

  <div class="field">
    <label>PASSWORD</label>
    <input type="password" id="password" placeholder="Min. 6 characters" oninput="checkStrength(this.value)" autocomplete="new-password">
    <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
    <div class="strength-label" id="strength-label">Enter a password</div>
  </div>

  <div class="field">
    <label>CONFIRM PASSWORD</label>
    <input type="password" id="confirm_password" placeholder="Re-enter password" autocomplete="new-password">
  </div>

  <button class="btn" id="register-btn" onclick="doRegister()">CREATE ACCOUNT</button>

  <div class="divider">OR</div>
  <a class="link" href="login.html">Already have an account? Sign in</a>
</div>

<script>
const API = '';

// Redirect if already logged in
if (localStorage.getItem('access_token')) {
  window.location.href = 'index.html';
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('success-msg').style.display = 'none';
}

function showSuccess(msg) {
  const el = document.getElementById('success-msg');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('error-msg').style.display = 'none';
}

function hideMessages() {
  document.getElementById('error-msg').style.display   = 'none';
  document.getElementById('success-msg').style.display = 'none';
}

function checkStrength(pw) {
  const fill  = document.getElementById('strength-fill');
  const label = document.getElementById('strength-label');
  let score = 0;
  if (pw.length >= 6)  score++;
  if (pw.length >= 10) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;

  const levels = [
    { w: '0%',   color: 'transparent', text: 'Enter a password' },
    { w: '25%',  color: '#FF3B5C',     text: 'Weak' },
    { w: '50%',  color: '#FFD02A',     text: 'Fair' },
    { w: '75%',  color: '#00D2FF',     text: 'Good' },
    { w: '100%', color: '#00E67A',     text: 'Strong ✓' },
  ];
  const lvl = levels[Math.min(score, 4)];
  fill.style.width      = lvl.w;
  fill.style.background = lvl.color;
  label.textContent     = lvl.text;
  label.style.color     = lvl.color;
}

async function doRegister() {
  hideMessages();

  const first_name      = document.getElementById('first_name').value.trim();
  const last_name       = document.getElementById('last_name').value.trim();
  const email           = document.getElementById('email').value.trim();
  const phone           = document.getElementById('phone').value.trim();
  const password        = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirm_password').value;
  const btn             = document.getElementById('register-btn');

  // Client-side validations
  if (!first_name || !last_name || !email || !password) {
    showError('Please fill in all required fields.');
    return;
  }
  if (first_name.length < 2) { showError('First name must be at least 2 characters.'); return; }
  if (last_name.length < 2)  { showError('Last name must be at least 2 characters.'); return; }
  if (!email.includes('@'))  { showError('Please enter a valid email address.'); return; }
  if (password.length < 6)   { showError('Password must be at least 6 characters.'); return; }
  if (password !== confirmPassword) { showError('Passwords do not match.'); return; }

  btn.disabled  = true;
  btn.innerHTML = '<span class="spinner"></span>CREATING ACCOUNT...';

  try {
    const res  = await fetch(`${API}/auth/register`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ first_name, last_name, email, password, phone })
    });

    const data = await res.json();

    if (data.success) {
      // Save token
      localStorage.setItem('access_token',  data.access_token);
      localStorage.setItem('refresh_token', data.refresh_token);
      localStorage.setItem('user',          JSON.stringify(data.user));

      showSuccess(`Welcome, ${data.user.first_name}! Redirecting to dashboard...`);
      setTimeout(() => window.location.href = 'index.html', 1500);
    } else {
      showError(data.message || 'Registration failed.');
      btn.disabled  = false;
      btn.innerHTML = 'CREATE ACCOUNT';
    }

  } catch (err) {
    showError('Cannot connect to server. Make sure the server is running.');
    btn.disabled  = false;
    btn.innerHTML = 'CREATE ACCOUNT';
  }
}
</script>
</body>
</html>
