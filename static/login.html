<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OccupAI — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #080B14;
    --surface: #0D1120;
    --border:  #1E2840;
    --cyan:    #00D2FF;
    --green:   #00E67A;
    --red:     #FF3B5C;
    --muted:   #4A5580;
    --text:    #D8E0F5;
    --white:   #EEF2FF;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 60px 60px;
    opacity: 0.3;
    pointer-events: none;
  }

  .card {
    position: relative;
    z-index: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 36px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 0 60px rgba(0,210,255,0.05);
  }

  /* Logo */
  .logo {
    text-align: center;
    margin-bottom: 8px;
  }
  .logo-occup { font-size: 32px; font-weight: 900; color: var(--cyan); letter-spacing: -1px; text-shadow: 0 0 30px rgba(0,210,255,0.4); }
  .logo-ai    { font-size: 32px; font-weight: 900; color: var(--white); letter-spacing: -1px; }
  .logo-sub   { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 3px; display: block; margin-top: 4px; }

  h2 {
    text-align: center;
    font-size: 16px;
    font-weight: 400;
    color: var(--muted);
    margin-bottom: 32px;
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 2px;
  }

  /* Form */
  .field { margin-bottom: 18px; }

  label {
    display: block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  input {
    width: 100%;
    background: #0A0D1A;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--white);
    font-family: 'Exo 2', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  input:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 3px rgba(0,210,255,0.1);
  }

  input::placeholder { color: var(--muted); }

  /* Error */
  .error-msg {
    display: none;
    background: rgba(255,59,92,0.1);
    border: 1px solid rgba(255,59,92,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--red);
    font-size: 13px;
    margin-bottom: 16px;
    text-align: center;
  }

  /* Button */
  .btn {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--cyan), #0099CC);
    color: #000;
    font-family: 'Exo 2', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 4px;
  }

  .btn:hover   { opacity: 0.9; }
  .btn:active  { transform: scale(0.99); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Divider */
  .divider {
    text-align: center;
    margin: 20px 0;
    color: var(--muted);
    font-size: 12px;
    font-family: 'Share Tech Mono', monospace;
    position: relative;
  }
  .divider::before, .divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 42%;
    height: 1px;
    background: var(--border);
  }
  .divider::before { left: 0; }
  .divider::after  { right: 0; }

  .link {
    display: block;
    text-align: center;
    color: var(--cyan);
    font-size: 13px;
    text-decoration: none;
    transition: opacity 0.2s;
  }
  .link:hover { opacity: 0.75; }

  /* Spinner */
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <span class="logo-occup">Occup</span><span class="logo-ai">AI</span>
    <span class="logo-sub">SMART PARKING SYSTEM</span>
  </div>
  <h2>SIGN IN</h2>

  <div class="error-msg" id="error-msg"></div>

  <div class="field">
    <label>EMAIL ADDRESS</label>
    <input type="email" id="email" placeholder="you@email.com" autocomplete="email">
  </div>

  <div class="field">
    <label>PASSWORD</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>

  <button class="btn" id="login-btn" onclick="doLogin()">LOGIN</button>

  <div class="divider">OR</div>

  <a class="link" href="register.html">Don't have an account? Register here</a>
</div>

<script>
const API = '';

// ── If already logged in, redirect to dashboard ──
if (localStorage.getItem('access_token')) {
  window.location.href = 'index.html';
}

// ── Allow Enter key ──
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('error-msg').style.display = 'none';
}

async function doLogin() {
  hideError();

  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('login-btn');

  if (!email || !password) {
    showError('Please enter your email and password.');
    return;
  }

  // Loading state
  btn.disabled   = true;
  btn.innerHTML  = '<span class="spinner"></span>SIGNING IN...';

  try {
    const res  = await fetch(`${API}/auth/login`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.success) {
      // Save token and user info
      localStorage.setItem('access_token',  data.access_token);
      localStorage.setItem('refresh_token', data.refresh_token);
      localStorage.setItem('user',          JSON.stringify(data.user));

      // Redirect based on role
      const role = data.user.role;
      if (role === 'admin' || role === 'owner') {
        window.location.href = 'index.html';   // dashboard
      } else {
        window.location.href = 'index.html';   // drivers go to dashboard too
      }
    } else {
      showError(data.message || 'Login failed. Please try again.');
      btn.disabled  = false;
      btn.innerHTML = 'LOGIN';
    }

  } catch (err) {
    showError('Cannot connect to server. Make sure the server is running.');
    btn.disabled  = false;
    btn.innerHTML = 'LOGIN';
  }
}
</script>
</body>
</html>
